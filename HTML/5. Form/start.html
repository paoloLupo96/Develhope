<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HTML Lesson</title>
  <style>
    label {
      display: block;
    }
  </style>
</head>

<body>
  <form action="dati_anagrafici.php" method="post">
    <fieldset>
      <legend>Dati Anagrafici e Contatti</legend>
      <label for="name_surname">Nome e Cognome</label>
      <input type="text" id="name_surname" name="name_surname" placeholder="Scrivi qui" required>
      <label for="birthday">Data di nascita</label>
      <input type="date" id="birthday" name="birthday" required>
      <label for="email">E-Mail</label>
      <input type="email" id="email" name="email" placeholder="esempio@dominio.com" required>
      <label for="pwd">Password:</label>
      <input type="password" id="pwd" name="pwd" placeholder="Scrivi qui" required>
      <label for="phone">Numero di telefono (cellulare)</label>
      <input type="tel" id="phone" name="phone" placeholder="123-45-678" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
        maxlength="12" required>
    </fieldset>

  <br>

    <fieldset>
      <legend>Scegli il tuo piano</legend>
      <table>
        <thead>
          <tr>
            <th>
              <label for="gratis"></label>
              Gratis
              <input type="radio" name="plan" id="gratis">
            </th>
            <th>
              <label for="essential"></label>
              Essential
              <input type="radio" name="plan" id="essential">
            </th>
            <th>
              <label for="extra"></label>
              Extra
              <input type="radio" name="plan" id="extra">
            </th>
            <th>
              <label for="premium"></label>
              Premium
              <input type="radio" name="plan" id="premium">
            </th>
            <th>
              <label for="pro"></label>
              Pro
              <input type="radio" name="plan" id="pro">
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td></td>
            <td>25$</td>
            <td>50$</td>
            <td>100$</td>
            <td>200$</td>
          </tr>
        </tbody>
      </table>
    </fieldset>

<!-- Nonostante la consegna suggerisse l'utilizzo del comando <input type="checkbox">, per la selezione dei piani,
    ho ritenuto più logico utilizzare il comando <input type="radio"> 
    immaginando che un ipotetico utente non avrebbe dovuto poter' abbonarsi a più piani, ma ad uno solo di esso." -->

    <br>

    <fieldset>
      <legend>Dati pagamento</legend>
      <label for="credit_card">Carta di credito</label>
      <input type="text" id="credit_card" name="credit_card" pattern="[0-9]{4}-[0-9]{4}-[0-9]{4}-[0-9]{4}"
        maxlength="19" placeholder="Numero carta" required>
      <label for="cvc">cvc</label>
      <input type="text" name="cvc" id="cvc" pattern="[0-9]{3}" maxlength="3" placeholder="123" required>
      <label for="exp_date">Data di scadenza</label>
      <input type="month" name="exp_date" id="exp_date" required>
      <label for="billing_address">Indirizzo di fatturazione</label>
      <input type="text" name="billing_address" id="billing_address" placeholder="Scrivi qui" required>
    </fieldset>
  </form>
</body>

<br>

<FOOTer>
  <input type="reset" value="Reset">
  <input type="submit" value="Submit">
</FOOTer>

</html>
