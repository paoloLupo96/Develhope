<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <title>HTML Lesson</title>
</head>

<body>
  <fieldset>
  <h1>
    <label for="numbers">Numeri (0-100)</label>
    <input type="number" name="numbers" min="0" max="100">
  </h1>
  <div>
    <button type="button" disabled>Premi qui</button>
  </div>
  <label for="useless">Seleziona</label>
  <input type="checkbox" name="useless" checked>
  <div>
    <label for="data">Inserisci data</label>
    <input type="date" name="data">
  </div>
</fieldset>
</body>

</html>

Ho evidenziato l'input numerico con con <h1> affinchè <input type= number> abbia il "focus on the opening of the page", fammi sapere se corretto. -->
